name: Mentis CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-gate:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation de pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Configuration du cache pnpm
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Mise en cache des dépendances
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile

      - name: Vérification de la syntaxe (Linter)
        run: pnpm run lint

      - name: Exécution des tests unitaires (Vitest)
        run: pnpm exec vitest run

      - name: Vérification de la compilation (SvelteKit Build)
        run: pnpm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          BETTER_AUTH_SECRET: "ci-test-secret-key"
          BETTER_AUTH_URL: "http://localhost:5173"